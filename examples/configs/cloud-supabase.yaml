version: 1
product:
  {
    name: Cloud Supabase,
    slug: cloud-supabase,
    type: saas,
    description: Profil CI FangaBase,
    locale: fr,
    timezone: Africa/Bamako,
    country: ML,
    default_currency: XOF,
  }
architecture: { target: cloud_vercel, frontend: next, backend: next, ui: next }
database: { engine: postgres, provider: supabase }
email: { provider: local_log }
storage: { provider: supabase }
queue: { provider: upstash }
cache: { provider: upstash }
billing: { modes: [credits, subscription] }
payments:
  providers: [fedapay]
  default_provider: fedapay
design: { source: fangabase }
features:
  {
    organizations: true,
    marketplace: false,
    admin: true,
    audit_log: true,
    notifications: true,
    uploads: true,
  }
