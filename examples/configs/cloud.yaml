version: 1
product:
  {
    name: Cloud Neon,
    slug: cloud-neon,
    type: saas,
    description: Profil CI FangaBase,
    locale: fr,
    timezone: Africa/Bamako,
    country: ML,
    default_currency: XOF,
  }
architecture: { target: cloud_vercel, frontend: next, backend: next, ui: next }
database: { engine: postgres, provider: neon }
email: { provider: resend }
storage: { provider: cloudinary }
queue: { provider: database }
cache: { provider: memory_dev }
billing: { modes: [credits, subscription] }
payments:
  providers: [stripe]
  default_provider: stripe
design: { source: headless }
features:
  {
    organizations: true,
    marketplace: false,
    admin: true,
    audit_log: true,
    notifications: true,
    uploads: true,
  }
