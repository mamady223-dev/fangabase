version: 1
product:
  {
    name: VPS Next,
    slug: vps-next,
    type: saas,
    description: Profil CI FangaBase,
    locale: fr,
    timezone: Africa/Bamako,
    country: ML,
    default_currency: XOF,
  }
architecture: { target: vps_next, frontend: next, backend: next, ui: next }
database: { engine: postgres, provider: postgres }
email: { provider: smtp }
storage: { provider: local_private }
queue: { provider: redis }
cache: { provider: redis }
billing: { modes: [credits, subscription] }
payments:
  providers: [fedapay]
  default_provider: fedapay
design: { source: headless }
features:
  {
    organizations: true,
    marketplace: false,
    admin: true,
    audit_log: true,
    notifications: true,
    uploads: true,
  }
