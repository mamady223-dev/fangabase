version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule: { interval: weekly }
    groups: { safe-minor: { update-types: [minor, patch] } }
  - package-ecosystem: composer
    directory: /apps/server
    schedule: { interval: weekly }
    groups: { safe-minor: { update-types: [minor, patch] } }
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: monthly }
