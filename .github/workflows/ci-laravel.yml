name: ci-laravel
on: [push, pull_request]
permissions: { contents: read }
jobs:
  laravel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: { php-version: "8.2", coverage: none }
      - run: composer install --working-dir=apps/server --no-interaction --prefer-dist
      - run: composer --working-dir=apps/server lint
      - run: composer --working-dir=apps/server test
