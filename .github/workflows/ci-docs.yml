name: ci-docs
on: [push, pull_request]
permissions: { contents: read }
jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No promises or placeholders in mandatory flows
        run: '! git grep -nE "production-ready|TODO|PLACEHOLDER" -- README.md docs apps packages tools'
      - name: Required documents
        run: test -f docs/progress.md && test -f docs/teaching/glossary.md && test -f THIRD_PARTY_NOTICES.md
