name: ci-docker
on: [push, pull_request]
permissions:
  contents: read
jobs:
  vps-next:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build the optional VPS Next image
        run: docker build --file templates/vps-next/Dockerfile --tag fangabase-vps-next:rc .
      - name: Verify non-root runtime
        run: test "$(docker image inspect fangabase-vps-next:rc --format '{{.Config.User}}')" = "node"
      - name: Verify no environment file is embedded
        run: '! docker run --rm fangabase-vps-next:rc sh -c "find /app -type f -name ''.env*'' -print -quit | grep ."'
      - name: Start and health-check the image
        run: docker run --detach --name fangabase-rc --publish 3100:3000 fangabase-vps-next:rc
      - run: timeout 60 sh -c 'until wget -qO- http://127.0.0.1:3100/api/health | grep -q '"'"'ok'"'"'; do sleep 2; done'
      - name: Stop cleanly
        if: always()
        run: docker stop --time 10 fangabase-rc
