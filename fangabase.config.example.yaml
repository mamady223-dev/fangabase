version: 1
product:
  name: FangaBase Demo
  slug: fangabase-demo
  type: saas
  description: Base applicative de démonstration FangaBase
  locale: fr
  timezone: Africa/Bamako
  country: ML
  default_currency: XOF
architecture:
  target: cloud_vercel
  frontend: next
  backend: next
  ui: next
deployment:
  family: cloud
  docker: false
  database: postgres
  vps_variant: null
database:
  engine: postgres
  provider: neon
email:
  provider: local_log
storage:
  provider: local_private
queue:
  provider: database
cache:
  provider: memory_dev
billing:
  modes: [credits, subscription]
payments:
  providers: [fedapay]
  default_provider: fedapay
design:
  source: headless
frontend_connection:
  source: headless
  frontend_origin: http://localhost:3000
  backend_url: http://localhost:8000/api/
  authentication: cookie_session
  cors:
    origins: [http://localhost:3000]
    credentials: true
  cookie_mode: same_origin_lax
features:
  organizations: true
  marketplace: false
  admin: true
  audit_log: true
  notifications: true
  uploads: true
