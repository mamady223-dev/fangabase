openapi: 3.1.0
info:
  title: FangaBase API
  version: 0.1.0-rc.1
servers:
  - url: https://api.example.invalid/api
paths:
  /health:
    get:
      operationId: health
      responses:
        "200":
          {
            description: Processus vivant,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/Health" } },
              },
          }
  /readiness:
    get:
      operationId: readiness
      responses:
        "200":
          {
            description: D?pendances obligatoires disponibles,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/Health" } },
              },
          }
        "503": { $ref: "#/components/responses/Error" }
  /auth/register:
    post:
      operationId: register
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/RegisterInput" } },
            },
        }
      responses:
        "201": { description: Compte cr?? }
        "422": { $ref: "#/components/responses/Error" }
  /auth/login:
    post:
      operationId: login
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/LoginInput" } },
            },
        }
      responses:
        "200": { description: Session ouverte }
        "401": { $ref: "#/components/responses/Error" }
  /auth/refresh:
    post:
      operationId: refreshSession
      security: [{ sessionCookie: [], csrfHeader: [] }]
      responses:
        "200": { description: Session tournee atomiquement }
        "401": { $ref: "#/components/responses/Error" }
        "419": { $ref: "#/components/responses/Error" }
  /auth/logout:
    post:
      operationId: logoutSession
      security: [{ sessionCookie: [], csrfHeader: [] }]
      responses:
        "200": { description: Session courante revoquee }
        "419": { $ref: "#/components/responses/Error" }
  /auth/logout-all:
    post:
      operationId: logoutAllSessions
      security: [{ sessionCookie: [], csrfHeader: [] }]
      responses:
        "200": { description: Toutes les sessions revoquees }
        "419": { $ref: "#/components/responses/Error" }
  /organizations:
    get:
      operationId: listOrganizations
      security: [{ sessionCookie: [] }]
      responses:
        "200": { description: Organisations accessibles uniquement }
        "401": { $ref: "#/components/responses/Error" }
    post:
      operationId: createOrganization
      security: [{ sessionCookie: [], csrfHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrganizationInput" }
      responses:
        "201": { description: Organisation creee }
        "422": { $ref: "#/components/responses/Error" }
  /billing/summary:
    get:
      operationId: billingSummary
      security: [{ sessionCookie: [] }]
      responses:
        "200": { description: Synthese financiere tenant-scopee }
        "401": { $ref: "#/components/responses/Error" }
  /billing/entitlements:
    get:
      operationId: listEntitlements
      security: [{ sessionCookie: [] }]
      responses:
        "200": { description: Capacites effectives du compte }
        "401": { $ref: "#/components/responses/Error" }
  /organizations/{organization}:
    parameters:
      - {
          in: path,
          name: organization,
          required: true,
          schema: { type: string, format: uuid },
        }
    get:
      operationId: getOrganization
      security: [{ sessionCookie: [] }]
      responses:
        "200": { description: Organisation tenant-scopee }
        "404": { $ref: "#/components/responses/Error" }
    patch:
      operationId: updateOrganization
      security: [{ sessionCookie: [], csrfHeader: [] }]
      responses:
        "200": { description: Organisation modifiee }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /organizations/{organization}/invitations:
    post:
      operationId: inviteOrganizationMember
      security: [{ sessionCookie: [], csrfHeader: [] }]
      parameters:
        - {
            in: path,
            name: organization,
            required: true,
            schema: { type: string, format: uuid },
          }
      responses:
        "202": { description: Invitation one-shot enregistree }
        "404": { $ref: "#/components/responses/Error" }
  /admin/users:
    get:
      operationId: listPlatformUsers
      security: [{ sessionCookie: [] }]
      parameters:
        - { in: query, name: page, schema: { type: integer, minimum: 1 } }
        - {
            in: query,
            name: per_page,
            schema: { type: integer, minimum: 1, maximum: 100 },
          }
      responses:
        "200": { description: Utilisateurs pagines }
        "403": { $ref: "#/components/responses/Error" }
  /webhooks/stripe:
    post:
      operationId: receiveStripeWebhook
      responses:
        "202": { description: ?v?nement enregistr? }
        "400": { $ref: "#/components/responses/Error" }
  /webhooks/payouts/{provider}:
    post:
      operationId: receivePayoutWebhook
      parameters:
        - { in: path, name: provider, required: true, schema: { type: string } }
      responses:
        "202": { description: Evenement de retrait enregistre }
        "400": { $ref: "#/components/responses/Error" }
components:
  securitySchemes:
    sessionCookie: { type: apiKey, in: cookie, name: fangabase_refresh }
    csrfHeader: { type: apiKey, in: header, name: X-CSRF-TOKEN }
  responses:
    Error:
      description: Erreur stable
      content:
        {
          application/json:
            { schema: { $ref: "#/components/schemas/ApiError" } },
        }
  schemas:
    Health:
      type: object
      required: [status, timestamp]
      properties:
        status: { type: string, enum: [ok, degraded] }
        timestamp: { type: string, format: date-time }
    RegisterInput:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        password: { type: string, minLength: 12, maxLength: 128 }
    LoginInput:
      $ref: "#/components/schemas/RegisterInput"
    OrganizationInput:
      type: object
      additionalProperties: false
      required: [name, slug]
      properties:
        name: { type: string, minLength: 2, maxLength: 120 }
        slug:
          {
            type: string,
            minLength: 2,
            maxLength: 80,
            pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$",
          }
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code: { type: string }
            message: { type: string }
            requestId: { type: string }
