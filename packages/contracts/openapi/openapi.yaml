openapi: 3.1.0
info:
  title: FangaBase API
  version: 0.1.0
servers:
  - url: https://api.example.invalid/v1
paths:
  /health:
    get:
      operationId: health
      responses:
        "200":
          {
            description: Processus vivant,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/Health" } },
              },
          }
  /readiness:
    get:
      operationId: readiness
      responses:
        "200":
          {
            description: D?pendances obligatoires disponibles,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/Health" } },
              },
          }
        "503": { $ref: "#/components/responses/Error" }
  /auth/register:
    post:
      operationId: register
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/RegisterInput" } },
            },
        }
      responses:
        "201": { description: Compte cr?? }
        "422": { $ref: "#/components/responses/Error" }
  /auth/login:
    post:
      operationId: login
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/LoginInput" } },
            },
        }
      responses:
        "200": { description: Session ouverte }
        "401": { $ref: "#/components/responses/Error" }
  /orders:
    post:
      operationId: createOrder
      parameters:
        - {
            in: header,
            name: Idempotency-Key,
            required: true,
            schema: { type: string, minLength: 16, maxLength: 128 },
          }
      responses:
        "201": { description: Commande cr??e }
        "409": { $ref: "#/components/responses/Error" }
  /webhooks/{provider}:
    post:
      operationId: receiveWebhook
      parameters:
        - { in: path, name: provider, required: true, schema: { type: string } }
      responses:
        "202": { description: ?v?nement enregistr? }
        "400": { $ref: "#/components/responses/Error" }
components:
  responses:
    Error:
      description: Erreur stable
      content:
        {
          application/json:
            { schema: { $ref: "#/components/schemas/ApiError" } },
        }
  schemas:
    Health:
      type: object
      required: [status, timestamp]
      properties:
        status: { type: string, enum: [ok, degraded] }
        timestamp: { type: string, format: date-time }
    RegisterInput:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        password: { type: string, minLength: 12, maxLength: 128 }
    LoginInput:
      $ref: "#/components/schemas/RegisterInput"
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code: { type: string }
            message: { type: string }
            requestId: { type: string }
