limit_req_zone $binary_remote_addr zone=fangabase_api:10m rate=10r/s;
server {
  listen 80;
  server_name app.example.com;
  location / { proxy_pass http://127.0.0.1:3000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
  location /api/ { limit_req zone=fangabase_api burst=20 nodelay; proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
}
