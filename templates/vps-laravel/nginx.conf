server {
  listen 80;
  server_name api.example.com;
  root /srv/fangabase/current/apps/server/public;
  index index.php;
  client_max_body_size 6m;
  location / { try_files $uri $uri/ /index.php?$query_string; }
  location ~ \.php$ { include fastcgi_params; fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name; fastcgi_param HTTP_PROXY ""; fastcgi_pass unix:/run/php/php8.2-fpm.sock; }
  location ~ /\.(?!well-known) { deny all; }
}
